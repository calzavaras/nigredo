<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Website für HappyPath</title>
  <desc id="desc">Stilisierte schwarze Browseransicht der HappyPath Startseite mit abstrahierter grosser Titelzeile, Spektral Logo, Kontaktfläche und vertikaler Sektionsnavigation.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="25" flood-color="#000" flood-opacity="0.72"/></filter>
    <filter id="dotGlow" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD34E"/>
      <stop offset="0.27" stop-color="#FF735F"/>
      <stop offset="0.52" stop-color="#FF3FA4"/>
      <stop offset="0.76" stop-color="#8D5CFF"/>
      <stop offset="1" stop-color="#22D7EF"/>
    </linearGradient>
    <linearGradient id="buttonEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFBE62"/>
      <stop offset="0.5" stop-color="#FF55A5"/>
      <stop offset="1" stop-color="#31D7EF"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#121014"/>
      <stop offset="1" stop-color="#080709"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="#070708"/>
  <ellipse cx="244" cy="126" rx="270" ry="120" fill="#FF3F80" opacity="0.035"/>
  <ellipse cx="1010" cy="676" rx="280" ry="120" fill="#6658FF" opacity="0.025"/>

  <g filter="url(#shadow)">
    <rect x="118" y="78" width="1044" height="644" rx="16" fill="url(#frame)" stroke="#2A272D"/>
    <rect x="118" y="78" width="1044" height="46" rx="16" fill="#110F12"/>
    <rect x="118" y="108" width="1044" height="16" fill="#110F12"/>
    <circle cx="150" cy="102" r="6" fill="#FF6277" opacity="0.82"/>
    <circle cx="170" cy="102" r="6" fill="#F8C957" opacity="0.82"/>
    <circle cx="190" cy="102" r="6" fill="#42D7D1" opacity="0.82"/>
    <rect x="320" y="93" width="640" height="18" rx="9" fill="#FFFFFF" opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <rect x="338" y="100" width="142" height="6" rx="3" fill="#FFFFFF" opacity="0.16"/>
  </g>

  <rect x="148" y="148" width="944" height="548" rx="12" fill="#020203" stroke="#FFFFFF" stroke-opacity="0.05"/>

  <!-- HappyPath Kopfzeile -->
  <g transform="translate(176 166)">
    <image width="58" height="52" preserveAspectRatio="xMidYMid meet" href="data:image/png;base64,"/>
    <rect x="58" y="14" width="114" height="10" rx="5" fill="#E5E3E7" opacity="0.76"/>
    <rect x="58" y="31" width="72" height="6" rx="3" fill="#E5E3E7" opacity="0.18"/>
  </g>

  <g transform="translate(1004 186)">
    <circle r="8" fill="none" stroke="#FFFFFF" stroke-opacity="0.23"/>
    <path d="M-8 0h16M0-8c2.7 4.1 2.7 11.9 0 16M0-8c-2.7 4.1-2.7 11.9 0 16" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="0.9"/>
    <rect x="19" y="-3" width="24" height="6" rx="3" fill="#FFFFFF" opacity="0.24"/>
    <path d="m54-2 3 3 3-3" fill="none" stroke="#FFFFFF" stroke-opacity="0.23" stroke-linecap="round"/>
  </g>

  <!-- Hero als abstrahiertes Abbild der echten Startseite -->
  <g transform="translate(184 300)">
    <rect width="270" height="6" rx="3" fill="#A7A2AD" opacity="0.64"/>

    <g transform="translate(0 54)" fill="#F3F2F4">
      <rect width="326" height="43" rx="7"/>
      <rect y="58" width="474" height="43" rx="7"/>
      <rect y="116" width="288" height="43" rx="7"/>
    </g>

    <g transform="translate(0 250)">
      <rect width="382" height="8" rx="4" fill="#99959E" opacity="0.72"/>
      <rect y="27" width="338" height="8" rx="4" fill="#99959E" opacity="0.55"/>
    </g>

    <g transform="translate(0 326)">
      <rect width="174" height="46" rx="23" fill="#F3F2F3"/>
      <rect x="1" y="1" width="172" height="44" rx="22" fill="none" stroke="url(#buttonEdge)" stroke-width="1.5"/>
      <rect x="39" y="19" width="96" height="8" rx="4" fill="#171519" opacity="0.88"/>
    </g>
  </g>

  <!-- Sektionsnavigation rechts -->
  <g transform="translate(1050 364)">
    <rect x="-62" y="-4" width="34" height="7" rx="3.5" fill="#E9E6EC" opacity="0.7"/>
    <circle r="13" fill="#8D5CFF" opacity="0.28" filter="url(#dotGlow)"/>
    <circle r="4" fill="#F4F0FF"/>
    <line y1="24" y2="186" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <circle cy="42" r="3" fill="#77737D"/>
    <circle cy="80" r="3" fill="#77737D"/>
    <circle cy="118" r="3" fill="#77737D"/>
    <circle cy="156" r="3" fill="#77737D"/>
    <circle cy="194" r="3" fill="#77737D"/>
  </g>

  <!-- Scrollhinweis -->
  <g transform="translate(604 644)">
    <rect width="72" height="6" rx="3" fill="#77727C" opacity="0.46"/>
    <line x1="36" y1="18" x2="36" y2="39" stroke="#FFFFFF" stroke-opacity="0.17"/>
    <circle cx="36" cy="40" r="2.5" fill="#F0EDF2"/>
  </g>

  <rect x="148" y="706" width="944" height="1" fill="#FFFFFF" opacity="0.06"/>
</svg>
