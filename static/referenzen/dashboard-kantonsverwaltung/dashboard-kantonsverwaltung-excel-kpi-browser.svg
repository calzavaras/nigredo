<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="rgba(0,0,0,0.55)"/></filter>
    <linearGradient id="barC" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <linearGradient id="barC2" x1="0" y1="1" x2="0" y2="0">
