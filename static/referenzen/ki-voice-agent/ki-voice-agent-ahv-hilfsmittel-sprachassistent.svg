<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.6)"/></filter>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A64DFF"/>
      <stop offset="100%" stop-color="#FF4D80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#08040f"/>
  <!-- Glow blobs -->
  <ellipse cx="400" cy="250" rx="300" ry="220" fill="rgba(166,77,255,0.22)" filter="url(#blur1)"/>
  <ellipse cx="880" cy="550" rx="260" ry="180" fill="rgba(255,77,128,0.14)" filter="url(#blur1)"/>

  <!-- Phone mockup -->
  <rect x="490" y="60" width="300" height="560" rx="36" fill="#1a0f2e" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Notch -->
  <rect x="590" y="72" width="100" height="24" rx="12" fill="#0d0720"/>
  <!-- Screen -->
  <rect x="502" y="106" width="276" height="500" rx="6" fill="#12082a"/>

  <!-- Avatar circle -->
  <circle cx="640" cy="220" r="46" fill="#2a1545"/>
  <circle cx="640" cy="210" r="22" fill="#3d1f66"/>
  <ellipse cx="640" cy="248" rx="34" ry="18" fill="#3d1f66"/>

  <!-- Name label -->
  <rect x="574" y="278" width="132" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
  <rect x="600" y="300" width="80" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>

  <!-- Status badge -->
  <rect x="594" y="320" width="92" height="20" rx="10" fill="rgba(0,210,100,0.2)" stroke="rgba(0,210,100,0.35)" stroke-width="1"/>
  <circle cx="607" cy="330" r="4" fill="#00d264"/>
  <rect x="616" y="325" width="58" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>

  <!-- Audio visualizer bars -->
  <rect x="535" y="388" width="14" height="28" rx="7" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="556" y="372" width="14" height="44" rx="7" fill="url(#barGrad)" opacity="0.75"/>
  <rect x="577" y="360" width="14" height="56" rx="7" fill="url(#barGrad)"/>
  <rect x="598" y="370" width="14" height="46" rx="7" fill="url(#barGrad)" opacity="0.85"/>
  <rect x="619" y="355" width="14" height="61" rx="7" fill="url(#barGrad)"/>
  <rect x="640" y="365" width="14" height="51" rx="7" fill="url(#barGrad)" opacity="0.9"/>
  <rect x="661" y="352" width="14" height="64" rx="7" fill="url(#barGrad)"/>
  <rect x="682" y="368" width="14" height="48" rx="7" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="703" y="378" width="14" height="38" rx="7" fill="url(#barGrad)" opacity="0.65"/>
  <rect x="724" y="385" width="14" height="31" rx="7" fill="url(#barGrad)" opacity="0.55"/>

  <!-- Transcript box -->
  <rect x="518" y="440" width="244" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="530" y="452" width="60" height="7" rx="3.5" fill="rgba(166,77,255,0.6)"/>
  <rect x="530" y="466" width="210" height="7" rx="3.5" fill="rgba(255,255,255,0.18)"/>
  <rect x="530" y="480" width="180" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="530" y="494" width="140" height="7" rx="3.5" fill="rgba(255,255,255,0.08)"/>

  <!-- End call button -->
  <circle cx="640" cy="556" r="24" fill="rgba(255,60,60,0.85)"/>
  <rect x="626" y="549" width="28" height="14" rx="4" fill="rgba(255,255,255,0.9)"/>

  <!-- Bottom bar -->
  <rect x="538" y="592" width="56" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="612" y="592" width="56" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="686" y="592" width="56" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
</svg>
